services:
  backup:
    build: .
    container_name: backup
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - ./scripts:/scripts:ro
      - ./rclone:/config/rclone:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/Data/backups:/backups
      - /home/ragnarok/homelab:/homelab:ro
    networks:
      - homelab

networks:
  homelab:
    external: true
