services:
  backup:
    build:
      context: ./backup
    container_name: backup
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - ./scripts:/scripts:ro
      - ./rclone:/config/rclone:ro
      # WARNING: Docker socket grants full daemon access (docker exec, docker run).
      # The :ro flag does NOT restrict the API — it is required for pg_dump and volume backups.
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/Data/backups:/backups
      - /home/ragnarok/homelab:/homelab:ro
    networks:
      - homelab

networks:
  homelab:
    external: true
