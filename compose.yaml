  - path:
    - cloudflared/compose.yaml
    - pgadmin/compose.yaml
    - nginx-manager/compose.yaml
    - dash/compose.yaml
    # - scrutiny/compose.yaml
    - homarr/compose.yaml
    - excalidraw/compose.yaml
    - invoice-ninja/compose.yaml
    - immich/compose.yaml
    - jellyfin/compose.yaml
    - jellyseerr/compose.yaml
    - n8n/compose.yaml
    - nextcloud/compose.yaml
    - qbittorrents/compose.yaml
    - prowlarr/compose.yaml
    - radarr/compose.yaml
    - sonarr/compose.yaml
    - suwayomi/compose.yaml
    - watchtower/compose.yaml
    - duplicati/compose.yaml
