services:
  disk-monitor:
    build: .
    container_name: disk-monitor
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    volumes:
      - ./scripts:/scripts:ro
      - /dev:/dev:ro
      - /:/host:ro
    privileged: true
    networks:
      - homelab

networks:
  homelab:
    external: true
