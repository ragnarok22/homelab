services:
  disk-monitor:
    build: .
    container_name: disk-monitor
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    cap_add:
      - SYSLOG  # required for dmesg access
    volumes:
      - ./scripts:/scripts:ro
      - /:/mnt/rootfs:ro
      - /home:/mnt/home:ro
      - /home/Data:/mnt/data:ro
      - alert-state:/tmp/disk-monitor-state
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  alert-state:
