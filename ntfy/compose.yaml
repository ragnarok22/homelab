services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    command:
      - serve
    restart: unless-stopped
    init: true
    env_file:
      - path: .env
        required: true
    volumes:
      - ./cache:/var/cache/ntfy
      - ./config:/etc/ntfy
    # ports:
    #   - 8081:80 # Web UI / API — access via reverse proxy instead
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - homelab

networks:
  homelab:
    external: true
