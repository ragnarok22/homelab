services:
  scrutiny:
    image: ghcr.io/analogj/scrutiny:v0.8.6-omnibus
    container_name: scrutiny
    restart: unless-stopped
    cap_add:
      - SYS_RAWIO  # SATA/SAS SMART access
      - SYS_ADMIN  # required for NVMe SMART access
    env_file:
      - path: .env
        required: true
    ports:
      - 8080:8080 # Web UI / API
      # - 8086:8086 # InfluxDB admin
    volumes:
      - ./config:/opt/scrutiny/config
      - ./influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    # Update this list if disks are replaced or added.
    # Alternative: mount /dev:/dev for auto-discovery (broader access).
    devices:
      - /dev/sda:/dev/sda:r
      - /dev/nvme0:/dev/nvme0:r         # NVMe controller (character device, needed for SMART)
      - /dev/nvme0n1:/dev/nvme0n1:r     # NVMe namespace (block device)
    networks:
      - homelab

networks:
  homelab:
    external: true
